buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 34
        ndkVersion = "27.0.12077973"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects {
    def configureProject = { proj ->
        if (proj.plugins.hasPlugin("com.android.application") || proj.plugins.hasPlugin("com.android.library")) {
            proj.android {
                ndkVersion = "27.0.12077973"
                defaultConfig {
                    ndk {
                        abiFilters "arm64-v8a"
                    }
                    externalNativeBuild {
                        cmake {
                            def currentArgs = arguments ?: []
                            if (!currentArgs.contains("-DANDROID_STL=c++_shared")) {
                                arguments = currentArgs + ["-DANDROID_STL=c++_shared"]
                            }
                        }
                    }
                }
                buildTypes.all { buildType ->
                    if (buildType.externalNativeBuild.cmake != null) {
                        def currentArgs = buildType.externalNativeBuild.cmake.arguments ?: []
                        if (!currentArgs.contains("-DANDROID_STL=c++_shared")) {
                            buildType.externalNativeBuild.cmake.arguments = currentArgs + ["-DANDROID_STL=c++_shared"]
                        }
                    }
                }
            }
            proj.android.buildTypes.all { buildType ->
                println "PROJECT: ${proj.name}, BUILDTYPE: ${buildType.name}, CMAKE ARGS: ${buildType.externalNativeBuild.cmake?.arguments}"
            }
        }
    }
    if (project.state.executed) {
        configureProject(project)
    } else {
        project.afterEvaluate {
            configureProject(project)
        }
    }
}

allprojects {
    configurations.all {
        resolutionStrategy {
            force "com.google.android.gms:play-services-location:20.0.0"
        }
    }
}
